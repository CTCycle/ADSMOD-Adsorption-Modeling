name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  python-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Python sanity
        run: |
          python --version
          python -c "print('ci sanity ok')"
      - name: Backend import validation
        run: |
          uv sync --project app/server --all-packages --group dev
          uv run --project app/server python -c "import core_service.app; import ml_service.app; import app.server.app"
          uv run --project app/server ruff check app/server
          uv run --project app/server python -m pytest app/tests/backend --ignore app/tests/backend/performance
          uv run --project app/server python -m pytest app/tests/unit
          uv run --project app/server python -m pytest app/tests/server
          uv run --project app/server python app/scripts/generate_openapi.py --app core_service.app:app --output app/shared/core_openapi.json
          uv run --project app/server python app/scripts/generate_openapi.py --app ml_service.app:app --output app/shared/ml_openapi.json

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build core frontend
        run: |
          cd app/client
          npm ci
          npm run lint
          npm run build
      - name: Build ML frontend
        run: |
          cd app/ml_client
          npm ci
          npm run lint
          npm run build
