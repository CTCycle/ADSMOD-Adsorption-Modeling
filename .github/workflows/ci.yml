name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  python-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Python sanity
        run: |
          python --version
          python -c "print('ci sanity ok')"
      - name: Backend import validation
        run: |
          cd app/server
          uv sync --all-packages --group dev
          python -c "from core_service.app import app as core_app; from ml_service.app import app as ml_app; print(core_app.title, ml_app.title)"
          export KERAS_BACKEND=torch
          export MPLBACKEND=Agg
          python -m scripts.generate_openapi --app core_service.app:app --output ../shared/core_openapi.json
          python -m scripts.generate_openapi --app ml_service.app:app --output ../shared/ml_openapi.json

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build core frontend
        run: |
          cd app/client
          npm ci
          npm run lint
          npm run build
      - name: Build ML frontend
        run: |
          cd app/ml_client
          npm ci
          npm run lint
          npm run build
